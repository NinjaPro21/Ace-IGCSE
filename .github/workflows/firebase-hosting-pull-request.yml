# Manual preview deploy only — not tied to PRs (avoids accidental deploys to wrong Firebase project).
name: Deploy to Firebase Hosting Preview (manual)
on:
  workflow_dispatch:
jobs:
  build_and_deploy_preview:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies and build
        run: |
          npm ci
          npm run build
      - name: Deploy to Firebase Hosting Preview
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PHYSNOTES101 }}
          projectId: physnotes101
