# Manual deploy only — live site (aceigcse.my) uses project-enlight-notes via local `npm run deploy:hosting`.
# This workflow is disabled for auto-deploy; run from Actions tab when intentionally needed.
name: Deploy to Firebase Hosting (manual)
on:
  workflow_dispatch:
jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
      - name: Install dependencies and build
        run: |
          npm ci
          npm run build
      - name: Deploy to Firebase Hosting
        uses: FirebaseExtended/action-hosting-deploy@v0
        with:
          repoToken: ${{ secrets.GITHUB_TOKEN }}
          firebaseServiceAccount: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_PHYSNOTES101 }}
          channelId: live
          projectId: physnotes101
